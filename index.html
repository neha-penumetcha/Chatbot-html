<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Chatbot – Groq</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      display: flex; justify-content: center; align-items: center;
      min-height: 100vh; padding: 16px;
    }
    .chat-container {
      width: 100%; max-width: 480px; background: #1a1a2e;
      border-radius: 20px; box-shadow: 0 8px 40px rgba(0,0,0,0.5);
      display: flex; flex-direction: column; overflow: hidden; height: 620px;
      border: 1px solid rgba(255,255,255,0.08);
    }

    /* Header */
    .chat-header {
      background: linear-gradient(90deg, #f55036, #ff6b35);
      color: #fff; padding: 16px 20px;
      display: flex; align-items: center; gap: 12px; flex-shrink: 0;
    }
    .header-avatar {
      width: 40px; height: 40px; background: rgba(255,255,255,0.2);
      border-radius: 50%; display: flex; align-items: center;
      justify-content: center; font-size: 20px;
    }
    .header-title { font-weight: 600; font-size: 15px; }
    .header-sub { font-size: 12px; opacity: 0.85; }
    .status { margin-left: auto; display: flex; align-items: center; gap: 5px; font-size: 11px; opacity: 0.9; }
    .status-dot { width: 7px; height: 7px; border-radius: 50%; background: #4ade80; }

    /* Setup banner */
    #setup-banner {
      background: #16213e; border-bottom: 1px solid rgba(255,255,255,0.08);
      padding: 12px 16px; font-size: 13px; color: #a0aec0; flex-shrink: 0;
    }
    #setup-banner a { color: #f55036; font-weight: 600; text-decoration: none; }
    #setup-banner a:hover { text-decoration: underline; }
    .key-row { display: flex; gap: 6px; margin-top: 8px; }
    #api-key-input {
      flex: 1; padding: 8px 12px;
      background: #0f3460; border: 1px solid rgba(255,255,255,0.12);
      border-radius: 8px; font-size: 13px; color: #fff; outline: none;
    }
    #api-key-input::placeholder { color: #718096; }
    #api-key-input:focus { border-color: #f55036; }
    #save-key-btn {
      background: #f55036; color: #fff; border: none; border-radius: 8px;
      padding: 8px 14px; font-size: 13px; cursor: pointer; white-space: nowrap;
    }
    #save-key-btn:hover { background: #e04428; }

    /* Model selector */
    #model-row {
      background: #16213e; border-bottom: 1px solid rgba(255,255,255,0.08);
      padding: 8px 16px; display: none; align-items: center; gap: 8px; flex-shrink: 0;
    }
    #model-row label { font-size: 12px; color: #718096; }
    #model-select {
      flex: 1; background: #0f3460; color: #fff;
      border: 1px solid rgba(255,255,255,0.12); border-radius: 6px;
      padding: 5px 8px; font-size: 12px; outline: none; cursor: pointer;
    }
    #model-select:focus { border-color: #f55036; }

    /* Messages */
    .chat-messages {
      flex: 1; overflow-y: auto; padding: 16px;
      display: flex; flex-direction: column; gap: 14px;
    }
    .chat-messages::-webkit-scrollbar { width: 4px; }
    .chat-messages::-webkit-scrollbar-thumb { background: #2d3748; border-radius: 4px; }

    .msg-row { display: flex; gap: 8px; align-items: flex-end; }
    .msg-row.user { flex-direction: row-reverse; }
    .msg-avatar {
      width: 30px; height: 30px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; flex-shrink: 0;
    }
    .msg-row.bot .msg-avatar { background: #2d3748; }
    .msg-row.user .msg-avatar { background: #2d3748; }
    .msg-wrap { display: flex; flex-direction: column; max-width: 78%; }
    .msg-row.user .msg-wrap { align-items: flex-end; }
    .msg-bubble {
      padding: 10px 14px; border-radius: 18px;
      font-size: 14px; line-height: 1.55;
      white-space: pre-wrap; word-break: break-word;
    }
    .msg-row.bot .msg-bubble {
      background: #2d3748; color: #e2e8f0;
      border-radius: 18px 18px 18px 4px;
    }
    .msg-row.user .msg-bubble {
      background: #f55036; color: #fff;
      border-radius: 18px 18px 4px 18px;
    }
    .msg-time { font-size: 10px; color: #4a5568; margin-top: 4px; padding: 0 4px; }

    /* Typing */
    .typing-indicator {
      display: flex; gap: 4px; align-items: center;
      padding: 12px 16px; background: #2d3748;
      border-radius: 18px 18px 18px 4px; width: fit-content;
    }
    .typing-indicator span {
      width: 7px; height: 7px; border-radius: 50%; background: #f55036;
      animation: bounce 1.2s ease-in-out infinite;
    }
    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-6px); }
    }

    /* Input */
    .chat-input-area {
      border-top: 1px solid rgba(255,255,255,0.08); padding: 10px 12px;
      display: flex; gap: 8px; align-items: flex-end;
      flex-shrink: 0; background: #16213e;
    }
    #user-input {
      flex: 1; padding: 10px 14px;
      background: #0f3460; color: #fff;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 14px; font-size: 14px; font-family: inherit;
      outline: none; resize: none; height: 44px; max-height: 120px;
      overflow-y: auto; line-height: 1.4; transition: border-color 0.2s;
    }
    #user-input::placeholder { color: #4a5568; }
    #user-input:focus { border-color: #f55036; }
    .send-btn {
      width: 44px; height: 44px; background: #f55036; color: #fff;
      border: none; border-radius: 14px; cursor: pointer; font-size: 20px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: background 0.2s, transform 0.1s;
    }
    .send-btn:hover:not(:disabled) { background: #e04428; }
    .send-btn:active:not(:disabled) { transform: scale(0.95); }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  </style>
</head>
<body>
<div class="chat-container">

  <div class="chat-header">
    <div class="header-avatar">⚡</div>
    <div>
      <div class="header-title">AI Assistant</div>

    </div>
    <div class="status"><div class="status-dot"></div> Online</div>
  </div>

  <div id="setup-banner">
    🔑 Get your <a href="https://console.groq.com/keys" target="_blank">free Groq API key</a> at console.groq.com — no credit card needed.
    <div class="key-row">
      <input type="password" id="api-key-input" placeholder="Paste your Groq API key here…" />
      <button id="save-key-btn" onclick="saveKey()">Start →</button>
    </div>
  </div>

  <div id="model-row">
    <label for="model-select">Model:</label>
    <select id="model-select">
      <option value="llama-3.3-70b-versatile">Llama 3.3 70B (best quality)</option>
      <option value="llama-3.1-8b-instant">Llama 3.1 8B (fastest)</option>
      <option value="mixtral-8x7b-32768">Mixtral 8x7B (long context)</option>
      <option value="gemma2-9b-it">Gemma 2 9B (Google)</option>
    </select>
  </div>

  <div class="chat-messages" id="messages"></div>

  <div class="chat-input-area">
    <textarea id="user-input" placeholder="Type a message… (Enter to send, Shift+Enter for new line)" disabled></textarea>
    <button class="send-btn" id="send-btn" onclick="sendMessage()" disabled>&#10148;</button>
  </div>
</div>

<script>
  const GROQ_URL = "https://corsproxy.io/?url=https://api.groq.com/openai/v1/chat/completions";
  let apiKey = "";
  let history = [{ role: "system", content: "You are a helpful, friendly, and concise AI assistant." }];
  let busy = false;

  function now() {
    return new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
  }

  function addMessage(text, sender) {
    const box = document.getElementById("messages");
    const row = document.createElement("div");
    row.className = "msg-row " + sender;

    const av = document.createElement("div");
    av.className = "msg-avatar";
    av.textContent = sender === "bot" ? "⚡" : "🧑";

    const wrap = document.createElement("div");
    wrap.className = "msg-wrap";

    const bubble = document.createElement("div");
    bubble.className = "msg-bubble";
    bubble.textContent = text;

    const time = document.createElement("div");
    time.className = "msg-time";
    time.textContent = now();

    wrap.appendChild(bubble);
    wrap.appendChild(time);
    row.appendChild(av);
    row.appendChild(wrap);
    box.appendChild(row);
    box.scrollTop = box.scrollHeight;
  }

  function showTyping() {
    const box = document.getElementById("messages");
    const row = document.createElement("div");
    row.className = "msg-row bot";
    row.id = "typing-row";
    const av = document.createElement("div");
    av.className = "msg-avatar";
    av.textContent = "⚡";
    const ind = document.createElement("div");
    ind.className = "typing-indicator";
    ind.innerHTML = "<span></span><span></span><span></span>";
    row.appendChild(av);
    row.appendChild(ind);
    box.appendChild(row);
    box.scrollTop = box.scrollHeight;
  }

  function hideTyping() {
    const el = document.getElementById("typing-row");
    if (el) el.remove();
  }

  function saveKey() {
    const val = document.getElementById("api-key-input").value.trim();
    if (!val) { alert("Please paste your API key first."); return; }
    apiKey = val;
    document.getElementById("setup-banner").style.display = "none";
    document.getElementById("model-row").style.display = "flex";
    document.getElementById("user-input").disabled = false;
    document.getElementById("send-btn").disabled = false;
    document.getElementById("user-input").focus();
    addMessage("Hi! I'm your AI assistant powered by Groq — blazing fast and free. Ask me anything! ⚡", "bot");
  }

  async function sendMessage() {
    const input = document.getElementById("user-input");
    const text = input.value.trim();
    if (!text || busy) return;

    const model = document.getElementById("model-select").value;

    input.value = "";
    input.style.height = "44px";
    busy = true;
    document.getElementById("send-btn").disabled = true;

    addMessage(text, "user");
    history.push({ role: "user", content: text });
    showTyping();

    try {
      const res = await fetch(GROQ_URL, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": "Bearer " + apiKey
        },
        body: JSON.stringify({
          model: model,
          messages: history,
          max_tokens: 1024,
          temperature: 0.7
        })
      });

      hideTyping();

      if (!res.ok) {
        const err = await res.json();
        const msg = err?.error?.message || "Request failed. Check your API key.";
        addMessage("⚠️ Error: " + msg, "bot");
        history.pop();
      } else {
        const data = await res.json();
        const reply = data.choices[0].message.content;
        history.push({ role: "assistant", content: reply });
        addMessage(reply, "bot");
      }
    } catch (e) {
      hideTyping();
      addMessage("⚠️ Network error. Please check your connection.", "bot");
      history.pop();
    }

    busy = false;
    document.getElementById("send-btn").disabled = false;
    input.focus();
  }

  document.getElementById("user-input").addEventListener("keydown", e => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      if (!busy && apiKey) sendMessage();
    }
  });

  document.getElementById("user-input").addEventListener("input", function() {
    this.style.height = "44px";
    this.style.height = Math.min(this.scrollHeight, 120) + "px";
  });

  document.getElementById("api-key-input").addEventListener("keydown", e => {
    if (e.key === "Enter") saveKey();
  });
</script>
</body>
</html>
